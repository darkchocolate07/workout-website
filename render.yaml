# Render Blueprint: API + Postgres for this monorepo.
# After deploy: copy the web service URL (https://<name>.onrender.com) into Netlify
# as VITE_API_BASE_URL (no trailing slash).
#
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: workout-api
    runtime: node
    region: oregon
    plan: free
    branch: master
    # Free tier: preDeployCommand is not allowed — run schema push in build (DATABASE_URL is injected when DB is linked).
    # NODE_ENV=production skips devDependencies; esbuild + drizzle-kit are devDeps — install with NODE_ENV=development first.
    buildCommand: >-
      corepack enable && corepack prepare pnpm@9 --activate &&
      NODE_ENV=development pnpm install &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Required by api-server auth (JWT). Min 16 chars; Render generates a secure value.
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: workout-db
          property: connectionString

databases:
  - name: workout-db
    plan: free
