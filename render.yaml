# Render Blueprint: API + Postgres for this monorepo.
# After deploy: copy the web service URL (https://<name>.onrender.com) into Netlify
# as VITE_API_BASE_URL (no trailing slash).
#
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: workout-api
    runtime: node
    region: oregon
    plan: free
    branch: master
    buildCommand: >-
      corepack enable && corepack prepare pnpm@9 --activate &&
      pnpm install &&
      pnpm --filter @workspace/api-server run build
    preDeployCommand: >-
      corepack enable && corepack prepare pnpm@9 --activate &&
      pnpm install &&
      pnpm --filter @workspace/db run push
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: workout-db
          property: connectionString

databases:
  - name: workout-db
    plan: free
